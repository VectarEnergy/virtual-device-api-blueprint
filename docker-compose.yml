services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - VICTRON_API_URL=${VICTRON_API_URL}
      - VICTRON_API_TOKEN=${VICTRON_API_TOKEN}
      - VICTRON_SITE_ID=${VICTRON_SITE_ID}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    volumes:
      - ./:/usr/src/app:ro

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solar
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
