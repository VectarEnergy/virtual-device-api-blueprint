services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - VICTRON_API_URL=${VICTRON_API_URL}
      - VICTRON_API_TOKEN=${VICTRON_API_TOKEN}
      - VICTRON_SITE_ID=${VICTRON_SITE_ID}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    # Do not bind-mount the host tree into the container for production-style runs;
    # mounting the host overwrites the image's node_modules and compiled binaries
    # (which can cause invalid ELF / exec format errors). If you need live-reload
    # for development prefer mounting only the `src` directory or using `npm run dev` locally.

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solar
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
